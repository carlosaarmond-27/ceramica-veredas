<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cerâmica Veredas | Gestão 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>

<style>
body { font-family: Arial; padding:20px; }
.box { margin-bottom:30px; padding:20px; border:1px solid #ccc; border-radius:8px; }
button { padding:8px 15px; cursor:pointer; }
table { width:100%; margin-top:10px; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
</style>
</head>

<body>

<h1>Cerâmica Veredas - Sistema 2.0</h1>

<!-- PRODUÇÃO -->
<div class="box">
<h2>Registrar Produção</h2>

<label>Data:
<input type="date" id="data">
</label>

<br><br>

<label>Total Produzido:
<input type="number" id="total">
</label>

<br><br>

<label>Fornos:
<input type="number" id="fornos">
</label>

<br><br>

<button onclick="salvarProducao()">Salvar Produção</button>
</div>

<!-- TABELA PRODUÇÃO -->
<div class="box">
<h2>Produção Registrada</h2>

<table>
<thead>
<tr>
<th>Data</th>
<th>Total</th>
<th>Fornos</th>
</tr>
</thead>
<tbody id="tabelaProducao"></tbody>
</table>

<br>
<button onclick="exportarExcel()">Exportar CSV</button>
</div>

<!-- ESTOQUE -->
<div class="box">
<h2>Estoque Atual</h2>

<p>Quantidade em Estoque: <b id="estoqueAtual">0</b></p>

<br>
<button onclick="registrarSaida()">Registrar Saída</button>
</div>

<!-- GRÁFICO -->
<div class="box">
<h2>Gráfico de Produção</h2>
<canvas id="grafico"></canvas>
<br>
<button onclick="gerarGrafico()">Atualizar Gráfico</button>
</div>

<script src="script.js"></script>

</body>
</html>
